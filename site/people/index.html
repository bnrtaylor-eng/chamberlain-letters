<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personography – The Chamberlain Letters</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
  <h1>Personography</h1>
</header>
<nav>
  <a href="../index.html">Home</a>
  <a href="../letters.html">Browse Letters</a>
  <a href="../people/index.html">Personography</a>

  <a href="../about.html">About</a>
  <a href="../guidelines.html">Editorial Guidelines</a>
</nav>

  <main>
    <input type="text" id="searchBox" placeholder="Search people..." class="search-input" />

    <div id="peopleContainer"></div>
  </main>
  <script type="module">
    import people from "../js/people.js";

    const container = document.getElementById("peopleContainer");
    const searchBox = document.getElementById("searchBox");

    function renderPeople(list) {
      container.innerHTML = "";
      function lastName(name) {
        const base = name.split(",")[0].trim();
        const parts = base.split(" ");
        return parts[parts.length - 1];
      }
      const sorted = [...list].sort((a, b) => lastName(a.name).localeCompare(lastName(b.name)));
      sorted.forEach(person => {
        const card = document.createElement("div");
        card.className = "entry-card";

        // Header band
        const cardHeader = document.createElement("div");
        cardHeader.className = "entry-card-header";
        const name = document.createElement("h2");
        name.textContent = person.name;
        name.id = person.id;
        cardHeader.appendChild(name);
        card.appendChild(cardHeader);

        // Body
        const cardBody = document.createElement("div");
        cardBody.className = "entry-card-body";

        const bio = document.createElement("p");
        bio.textContent = person.shortBio || "[No biography yet]";
        cardBody.appendChild(bio);

        const mentions = document.createElement("p");
        mentions.innerHTML = "<strong>Mentioned in:</strong> " + person.letters.map(n =>
          `<a href="../letter.html?file=tei/chamberlain-letter${n}.xml">Letter ${n}</a>`).join(", ");
        cardBody.appendChild(mentions);

        const links = document.createElement("ul");
        links.className = "entry-links";
        for (const [key, url] of Object.entries(person.externalLinks || {})) {
          if (url) {
            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = url;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.textContent = `View on ${key.charAt(0).toUpperCase() + key.slice(1)}`;
            li.appendChild(a);
            links.appendChild(li);
          }
        }
        cardBody.appendChild(links);
        card.appendChild(cardBody);

        container.appendChild(card);
      });
    }

    searchBox.addEventListener("input", () => {
      const query = searchBox.value.toLowerCase();
      const filtered = people.filter(p => p.name.toLowerCase().includes(query));
      renderPeople(filtered);
    });

    renderPeople(people);
  </script>
  <footer>
    &copy; 2025 The Chamberlain Letters. Licensed under CC BY 4.0.
  </footer>
</body>
</html>
